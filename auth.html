<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Narde — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15161a; --surface:#1a1c21; --surface2:#23252b; --surface3:#1f2127;
    --border:rgba(255,255,255,.08); --border-soft:rgba(255,255,255,.06);
    --text:#f1efe9; --text2:#cfd0d6; --muted:#83858e;
    --accent:#46ac79; --accent-hover:#54bd87; --accent-soft:#1c3a2d;
    --accent-text:#7fdca8; --on-accent:#0e1411; --danger:#d6584f;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:Manrope,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased}
  .app{max-width:420px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;
    padding:0 20px 28px}
  .hero{display:flex;flex-direction:column;align-items:center;text-align:center;
    padding:48px 0 22px}
  .logo{width:60px;height:60px;border-radius:18px;background:linear-gradient(150deg,#54bd87,#2f8a5e);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 12px 28px rgba(70,172,121,.34)}
  .logo .diamond{width:24px;height:24px;background:var(--on-accent);transform:rotate(45deg);
    border-radius:5px}
  .wordmark{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-top:14px}
  .tagline{font-size:13.5px;font-weight:600;color:var(--muted);margin-top:6px;line-height:1.5;
    max-width:280px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:18px;
    box-shadow:0 30px 70px rgba(0,0,0,.5)}
  .tabs{display:flex;background:var(--surface3);border-radius:13px;padding:4px;gap:4px;margin-bottom:18px}
  .tab{flex:1;border:none;background:transparent;color:var(--muted);font-family:inherit;
    font-size:14px;font-weight:700;padding:11px 0;border-radius:10px;cursor:pointer;transition:all .15s}
  .tab.active{background:var(--surface2);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.3)}
  .field{margin-bottom:13px}
  .field.hide{display:none}
  label{display:block;font-size:10.5px;font-weight:700;text-transform:uppercase;
    letter-spacing:.09em;color:var(--muted);margin:0 0 7px 2px}
  .inwrap{position:relative}
  input{width:100%;height:52px;background:var(--surface2);border:1px solid var(--border);
    border-radius:14px;padding:0 14px;color:var(--text);font-family:inherit;font-size:15px;
    font-weight:600;outline:none;transition:border-color .15s,box-shadow .15s}
  input::placeholder{color:#6c6e77;font-weight:500}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(70,172,121,.18)}
  .reveal{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:transparent;
    border:none;color:var(--muted);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;
    padding:8px}
  .forgot{display:block;text-align:right;font-size:12.5px;font-weight:700;color:var(--accent-text);
    text-decoration:none;margin:-2px 2px 14px 0}
  .forgot.hide{display:none}
  .btn{width:100%;height:56px;border-radius:16px;border:none;font-family:inherit;font-size:16px;
    font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
    transition:transform .12s,filter .12s}
  .btn:active{transform:scale(.985)}
  .btn.primary{background:linear-gradient(180deg,#54bd87,#3f9d6e);color:var(--on-accent);
    box-shadow:0 12px 26px rgba(70,172,121,.32)}
  .btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);
    font-size:15px;font-weight:700;height:52px}
  .divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:11px;font-weight:700;
    text-transform:uppercase;letter-spacing:.1em;margin:18px 0}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
  .alt{display:flex;flex-direction:column;gap:10px}
  .footer{margin-top:auto;text-align:center;font-size:12px;font-weight:600;color:var(--muted);
    line-height:1.6;padding-top:24px}
  .footer a{color:var(--text2);text-decoration:none}
  .gicon{width:18px;height:18px;flex:none}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 16px;
    border-radius:12px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;
    box-shadow:0 16px 40px rgba(0,0,0,.5);max-width:330px;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <div class="logo"><div class="diamond"></div></div>
    <div class="wordmark">Narde</div>
    <div class="tagline">Online Long Narde — play, get rated, and review every game.</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" data-mode="signin">Sign in</button>
      <button class="tab" data-mode="signup">Create account</button>
    </div>

    <form id="form" autocomplete="off" novalidate>
      <div class="field hide" id="f-name">
        <label>Username</label>
        <div class="inwrap"><input id="name" type="text" placeholder="How others will see you" /></div>
      </div>

      <div class="field">
        <label>Email</label>
        <div class="inwrap"><input id="email" type="email" placeholder="you@example.com" /></div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="inwrap">
          <input id="pass" type="password" placeholder="••••••••" />
          <button type="button" class="reveal" id="reveal">Show</button>
        </div>
      </div>

      <div class="field hide" id="f-confirm">
        <label>Confirm password</label>
        <div class="inwrap"><input id="confirm" type="password" placeholder="••••••••" /></div>
      </div>

      <a href="#" class="forgot" id="forgot">Forgot password?</a>

      <button type="submit" class="btn primary" id="submit">Sign in</button>
    </form>

    <div class="divider">or</div>

    <div class="alt">
      <button class="btn ghost" id="google">
        <svg class="gicon" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35 24 35c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 5.1 29.6 3 24 3 12.9 3 4 11.9 4 23s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-2.5z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 7.1 29.6 5 24 5 16 5 9.1 9.6 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 43c5.2 0 10-2 13.6-5.2l-6.3-5.3C29.2 34 26.7 35 24 35c-5.3 0-9.7-3.6-11.3-8.4l-6.5 5C9.1 38.3 16 43 24 43z"/>
          <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.5l6.3 5.3C41.2 36 44 30.5 44 23c0-1.3-.1-2.3-.4-2.5z"/>
        </svg>
        Continue with Google
      </button>
      <button class="btn ghost" id="guest">Play as guest</button>
    </div>
  </div>

  <div class="footer">
    By continuing you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>.
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var SB_URL = "https://seisnfpeyptawraxagvb.supabase.co";
  var SB_KEY = "sb_publishable_WAmKFRa_cGn-Jl-5dHed5w_b_7ll990";
  var sb = window.supabase.createClient(SB_URL, SB_KEY);

  var mode = "signin";
  var tabs = document.querySelectorAll(".tab");
  var fName = document.getElementById("f-name");
  var fConfirm = document.getElementById("f-confirm");
  var forgot = document.getElementById("forgot");
  var submit = document.getElementById("submit");

  function setMode(m){
    mode = m;
    tabs.forEach(function(t){ t.classList.toggle("active", t.dataset.mode === m); });
    var signup = m === "signup";
    fName.classList.toggle("hide", !signup);
    fConfirm.classList.toggle("hide", !signup);
    forgot.classList.toggle("hide", signup);
    submit.textContent = signup ? "Create account" : "Sign in";
  }
  tabs.forEach(function(t){ t.addEventListener("click", function(){ setMode(t.dataset.mode); }); });

  var pass = document.getElementById("pass");
  document.getElementById("reveal").addEventListener("click", function(){
    var show = pass.type === "password";
    pass.type = show ? "text" : "password";
    this.textContent = show ? "Hide" : "Show";
  });

  var toast = document.getElementById("toast"), tT;
  function showToast(msg){
    toast.textContent = msg; toast.classList.add("show");
    clearTimeout(tT); tT = setTimeout(function(){ toast.classList.remove("show"); }, 3200);
  }

  function go(){ window.location.href = "home.html"; }
  function busy(on){
    submit.disabled = on; submit.style.opacity = on ? ".7" : "1";
    submit.textContent = on ? "Please wait…" : (mode === "signup" ? "Create account" : "Sign in");
  }

  // Already signed in? Skip straight to Home.
  sb.auth.getSession().then(function(r){ if (r.data && r.data.session) window.location.replace("home.html"); });

  document.getElementById("form").addEventListener("submit", async function(e){
    e.preventDefault();
    var email = document.getElementById("email").value.trim();
    var password = document.getElementById("pass").value;
    if (!email) { showToast("Enter your email"); return; }
    if (password.length < 6) { showToast("Password must be at least 6 characters"); return; }
    busy(true);
    try {
      if (mode === "signup") {
        var name = document.getElementById("name").value.trim();
        var confirm = document.getElementById("confirm").value;
        if (password !== confirm) { showToast("Passwords don't match"); busy(false); return; }
        var r = await sb.auth.signUp({ email: email, password: password,
          options: { data: { username: name || email.split("@")[0] } } });
        if (r.error) { showToast(r.error.message); busy(false); return; }
        if (!r.data.session) { showToast("Account created — please sign in"); setMode("signin"); busy(false); return; }
        go();
      } else {
        var r2 = await sb.auth.signInWithPassword({ email: email, password: password });
        if (r2.error) { showToast(r2.error.message); busy(false); return; }
        go();
      }
    } catch (err) { showToast("Something went wrong — please try again"); busy(false); }
  });

  document.getElementById("google").addEventListener("click", async function(){
    try {
      var r = await sb.auth.signInWithOAuth({ provider: "google",
        options: { redirectTo: location.origin + "/home.html" } });
      if (r.error) showToast("Google sign-in isn't set up yet — use email or guest for now");
    } catch (e) { showToast("Google sign-in isn't set up yet — use email or guest for now"); }
  });

  document.getElementById("guest").addEventListener("click", function(){
    window.location.href = "home.html?guest=1";
  });

  document.getElementById("forgot").addEventListener("click", async function(e){
    e.preventDefault();
    var email = document.getElementById("email").value.trim();
    if (!email) { showToast("Enter your email first, then tap Forgot"); return; }
    var r = await sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin + "/auth.html" });
    showToast(r.error ? r.error.message : "Password reset email sent (if the address exists)");
  });
</script>
</body>
</html>
