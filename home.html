<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Narde — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15161a; --surface:#1a1c21; --surface2:#23252b; --surface3:#1f2127;
    --border:rgba(255,255,255,.08);
    --text:#f1efe9; --text2:#cfd0d6; --muted:#83858e;
    --accent:#46ac79; --accent-hover:#54bd87; --accent-soft:#1c3a2d;
    --accent-text:#7fdca8; --on-accent:#0e1411;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:Manrope,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  .app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:0 18px 80px}
  .tnum{font-variant-numeric:tabular-nums}
  .ov{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)}

  /* header */
  .header{display:flex;align-items:center;gap:10px;padding:18px 0 14px}
  .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(150deg,#54bd87,#2f8a5e);
    display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(70,172,121,.3)}
  .logo .d{width:14px;height:14px;background:var(--on-accent);transform:rotate(45deg);border-radius:3px}
  .brand{font-size:20px;font-weight:800;letter-spacing:-.02em}
  .sp{flex:1}
  .rate{text-align:right;line-height:1.1}
  .rate .v{font-size:13px;font-weight:800}
  .avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:800;background:radial-gradient(circle at 38% 30%,#f5edda,#d7c8a6 82%);
    color:#2a251d;position:relative}
  .avatar .on{position:absolute;right:-1px;bottom:-1px;width:11px;height:11px;border-radius:50%;
    background:var(--accent);border:2px solid var(--bg)}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px}
  .row{display:flex;align-items:center;gap:12px}

  /* resume */
  .resume{margin-bottom:14px;cursor:pointer}
  .ava-sm{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:800;background:radial-gradient(circle at 38% 30%,#45474e,#1b1c20 84%);color:#ece8df}
  .resume .t{font-size:15px;font-weight:700}
  .resume .s{font-size:12.5px;font-weight:700;color:var(--accent-text);margin-top:2px}
  .chev{color:var(--muted);font-size:22px}

  /* hero */
  .hero{border-radius:20px;padding:18px;margin-bottom:14px;
    background:linear-gradient(160deg,#234436,#16241e);border:1px solid rgba(70,172,121,.28)}
  .hero .ov{color:var(--accent-text)}
  .hero h2{margin:5px 0 2px;font-size:24px;font-weight:800;letter-spacing:-.02em}
  .hero p{margin:6px 0 12px;font-size:13px;font-weight:600;color:var(--text2)}
  .btn{width:100%;height:54px;border-radius:16px;border:none;font-family:inherit;font-size:16px;
    font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
    transition:transform .12s}
  .btn:active{transform:scale(.985)}
  .btn.primary{background:linear-gradient(180deg,#54bd87,#3f9d6e);color:var(--on-accent);
    box-shadow:0 10px 24px rgba(70,172,121,.3)}
  .btn.sub{background:var(--surface2);color:var(--text);border:1px solid var(--border);box-shadow:none}
  .tag{font-size:12px;font-weight:700;opacity:.8}
  .online{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:#8fae9e;margin-top:2px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1.8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .joinrow{display:flex;gap:10px;margin-top:10px}
  .joinrow input{flex:1;height:46px;border-radius:12px;border:1px solid var(--border);background:rgba(0,0,0,.25);
    color:var(--text);font-size:16px;padding:0 14px;letter-spacing:3px;text-transform:uppercase;font-family:inherit}
  .joinrow .jbtn{width:90px;height:46px;border-radius:12px;border:none;background:var(--accent);color:#0e1411;
    font-weight:800;font-family:inherit;cursor:pointer;font-size:15px}

  /* engine card */
  .engine{margin-bottom:14px}
  .lvl{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:800;background:var(--surface2);color:var(--accent-text);
    box-shadow:0 0 0 2px var(--accent)}
  .seg{display:flex;gap:6px;margin-top:12px}
  .seg button{flex:1;height:40px;border-radius:11px;border:1px solid var(--border);background:var(--surface2);
    color:var(--text2);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
  .seg button.on{background:rgba(70,172,121,.16);border-color:var(--accent);color:var(--accent-text)}

  .title{font-size:15px;font-weight:700}
  .sub{font-size:12.5px;font-weight:600;color:var(--muted);margin-top:2px}

  /* bottom nav */
  .nav{position:fixed;left:0;right:0;bottom:0;max-width:430px;margin:0 auto;display:flex;
    background:#16171c;border-top:1px solid var(--border);padding:9px 0 14px}
  .nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;
    color:var(--muted);font-size:10.5px;font-weight:700}
  .nav a.on{color:var(--accent-text)}
  .nav .ic{width:22px;height:22px;border-radius:6px;border:2px solid currentColor;opacity:.9}
  .nav a.on .ic{background:rgba(70,172,121,.18)}

  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(14px);
    background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:11px 16px;
    border-radius:12px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;
    box-shadow:0 16px 40px rgba(0,0,0,.5);max-width:320px;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo"><div class="d"></div></div>
    <div class="brand">Narde</div>
    <div class="sp"></div>
    <div class="rate"><div class="v tnum">1610</div><div class="ov">Rating</div></div>
    <div class="avatar">R<div class="on"></div></div>
  </div>

  <a class="card resume row" id="resumeCard" href="review.html" style="display:none;text-decoration:none;color:inherit">
    <div class="ava-sm">N</div>
    <div style="flex:1">
      <div class="t" id="resTitle">Last game</div>
      <div class="s" id="resSub"></div>
    </div>
    <div class="chev">›</div>
  </a>

  <div class="hero">
    <div class="row" style="justify-content:space-between;align-items:flex-start">
      <div><div class="ov">1v1 · New</div><h2>Play Online</h2></div>
      <div class="online"><span class="dot"></span>online</div>
    </div>
    <p>Play a friend, or get matched for a ranked game.</p>
    <button class="btn primary" onclick="go('online.html?go=quick')">⚡ Quick match <span class="tag">ranked</span></button>
    <button class="btn sub" style="margin-top:10px" onclick="go('online.html?go=friend')">👥 Play a friend <span class="tag">casual</span></button>
    <div class="joinrow">
      <input id="homeJoin" placeholder="CODE" maxlength="6" autocomplete="off" />
      <button class="jbtn" onclick="joinByCode()">Join</button>
    </div>
  </div>

  <div class="card engine">
    <div class="row">
      <div style="flex:1">
        <div class="title">Play the Engine</div>
        <div class="sub">Practice anytime — the engine that trains daily.</div>
      </div>
      <div class="lvl" id="lvlBadge">8</div>
    </div>
    <div class="seg" id="seg">
      <button data-l="easy">Easy</button>
      <button class="on" data-l="medium">Medium</button>
      <button data-l="hard">Hard</button>
    </div>
    <div class="seg" id="matchseg" style="margin-top:8px">
      <button data-m="1">1 game</button>
      <button data-m="3">Match to 3</button>
      <button class="on" data-m="5">Match to 5</button>
    </div>
    <button class="btn primary" style="margin-top:12px" onclick="go('game.html')">Play</button>
  </div>

</div>

<div class="nav">
  <a class="on" href="home.html"><span class="ic"></span>Home</a>
  <a href="game.html"><span class="ic"></span>Play</a>
  <a href="#" onclick="toast('Puzzles come soon.');return false;"><span class="ic"></span>Puzzles</a>
  <a href="profile.html"><span class="ic"></span>Profile</a>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var SB_URL = "https://seisnfpeyptawraxagvb.supabase.co";
  var SB_KEY = "sb_publishable_WAmKFRa_cGn-Jl-5dHed5w_b_7ll990";
  var sb = window.supabase.createClient(SB_URL, SB_KEY);
  var isGuest = new URLSearchParams(location.search).get("guest") === "1";

  async function initHome(){
    var s = await sb.auth.getSession();
    var session = s.data && s.data.session;
    if (!session && !isGuest) { window.location.replace("auth.html"); return; }
    var av = document.querySelector(".avatar");
    if (session) {
      var uid = session.user.id;
      var p = await sb.from("profiles").select("username,rating").eq("id", uid).single();
      var prof = p.data || {};
      var name = prof.username || (session.user.email || "Player").split("@")[0];
      document.querySelector(".rate .v").textContent = (prof.rating != null ? prof.rating : 1500);
      av.childNodes[0].nodeValue = name.charAt(0).toUpperCase();
      av.style.cursor = "pointer";
      av.addEventListener("click", function(){ go("profile.html"); });
      try {
        var lg = await sb.from("games").select("result,is_mars,rating_delta").eq("user_id", uid)
          .order("created_at", { ascending: false }).limit(1);
        if (lg.data && lg.data.length) {
          var g = lg.data[0], won = g.result === "win";
          document.getElementById("resTitle").textContent = (won ? "Won" : "Lost") + " vs Narde Engine" + (g.is_mars ? " · Mars" : "");
          var d = g.rating_delta > 0 ? "+" + g.rating_delta : ("" + (g.rating_delta || 0));
          document.getElementById("resSub").textContent = "Last game · " + d + " rating · tap to review";
          document.getElementById("resumeCard").style.display = "flex";
        }
      } catch (e) {}
    } else {
      document.querySelector(".rate .v").textContent = "—";
      av.childNodes[0].nodeValue = "G";
      av.style.cursor = "pointer";
      av.addEventListener("click", function(){ go("auth.html"); });
    }
  }
  initHome();

  function go(url){ window.location.href = url; }
  function joinByCode(){ var c = (document.getElementById("homeJoin").value || "").trim().toUpperCase();
    if (c.length < 4) { toast("Enter your friend's code"); return; } go("online.html?join=" + c); }
  var tT, te=document.getElementById('toast');
  function toast(m){ te.textContent=m; te.classList.add('show'); clearTimeout(tT);
    tT=setTimeout(function(){ te.classList.remove('show'); },2600); }
  var seg=document.getElementById('seg'), badge=document.getElementById('lvlBadge');
  function badgeFor(l){ return l==='easy'?'E':(l==='hard'?'H':'M'); }
  function setLevel(l){ try{ localStorage.setItem('narde_level', l); }catch(e){}
    seg.querySelectorAll('button').forEach(function(x){ x.classList.toggle('on', x.dataset.l===l); });
    badge.textContent = badgeFor(l); }
  seg.querySelectorAll('button').forEach(function(b){ b.addEventListener('click', function(){ setLevel(b.dataset.l); }); });
  (function(){ var saved='medium'; try{ saved=localStorage.getItem('narde_level')||'medium'; }catch(e){} setLevel(saved); })();

  var mseg=document.getElementById('matchseg');
  function setMatch(m){ try{ localStorage.setItem('narde_match', m); }catch(e){}
    mseg.querySelectorAll('button').forEach(function(x){ x.classList.toggle('on', x.dataset.m===String(m)); }); }
  mseg.querySelectorAll('button').forEach(function(b){ b.addEventListener('click', function(){ setMatch(b.dataset.m); }); });
  (function(){ var sm='5'; try{ sm=localStorage.getItem('narde_match')||'5'; }catch(e){} setMatch(sm); })();
</script>
</body>
</html>
