<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Narde — Play</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15161a; --surface:#1a1c21; --surface2:#23252b; --surface3:#1f2127;
    --line:rgba(255,255,255,.08); --text:#f1efe9; --text2:#cfd0d6; --muted:#83858e;
    --accent:#46ac79; --accent-text:#7fdca8; --on-accent:#0e1411;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:Manrope,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  .app{max-width:430px;margin:0 auto;height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column;padding:0 18px 18px}
  .tnum{font-variant-numeric:tabular-nums}

  .topbar{display:flex;align-items:center;gap:8px;padding:12px 0 6px}
  .icbtn{width:34px;height:34px;border-radius:11px;background:var(--surface3);color:var(--muted);display:flex;
    align-items:center;justify-content:center;font-size:20px;border:none;text-decoration:none;cursor:pointer;flex:none}
  .tbtitle{flex:1;text-align:center;line-height:1.15}
  .tbtitle .ov{font-size:10.5px;font-weight:700;letter-spacing:.09em;color:var(--muted);text-transform:uppercase}
  .tbtitle .sc{font-size:15px;font-weight:800}

  .strip{display:flex;align-items:center;gap:12px;padding:6px 0}
  .stripmid{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1}
  .striptop{display:flex;align-items:center;gap:7px}
  .stripbot{display:flex;align-items:center;gap:8px}
  .av{width:42px;height:42px;flex:0 0 42px;border-radius:13px;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:16px;letter-spacing:-.02em;border:1px solid rgba(255,255,255,.08);box-shadow:0 2px 6px rgba(0,0,0,.35)}
  .av.b{background:radial-gradient(circle at 38% 30%,#45474e,#1b1c20 84%);color:#ece8df}
  .av.w{background:radial-gradient(circle at 38% 30%,#f5edda,#d7c8a6 82%);color:#2a251d}
  .strip.active .av{border:2px solid var(--accent);box-shadow:0 0 0 3px rgba(70,172,121,.18),0 4px 10px rgba(0,0,0,.4)}
  .nm{color:#f1efe9;font-weight:700;font-size:15px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
  .flagchip{font-size:10px;font-weight:700;letter-spacing:.04em;color:#8b8d96;background:#23252b;
    border:1px solid rgba(255,255,255,.06);border-radius:5px;padding:2px 5px;line-height:1}
  .rating{color:#8b8d96;font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
  .thinklab{color:var(--accent);font-size:12.5px;font-weight:700;letter-spacing:-.01em}
  .clock{flex:0 0 auto;padding:8px 13px;border-radius:11px;font-weight:800;font-size:17px;
    font-variant-numeric:tabular-nums;letter-spacing:.01em;background:#23252b;color:#cfd0d6;
    border:1px solid rgba(255,255,255,.06);min-width:64px;text-align:center}
  .strip.active .clock{background:var(--accent);color:#0e1411;border-color:var(--accent);box-shadow:0 4px 14px rgba(70,172,121,.3)}

  .turnpill{align-self:center;display:flex;align-items:center;gap:7px;margin:4px 0 6px;padding:6px 14px;
    border-radius:999px;background:rgba(70,172,121,.14);border:1px solid rgba(70,172,121,.32)}
  .turnpill .tdot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:ndpulse2 1.6s infinite}
  .turnpill .tlabel{font-size:12.5px;font-weight:700;color:var(--accent-text)}
  .turnpill.engine{background:var(--surface2);border-color:var(--line)}
  .turnpill.engine .tdot{background:var(--muted);animation:none}
  .turnpill.engine .tlabel{color:var(--muted)}
  @keyframes ndpulse2{0%,100%{opacity:1}50%{opacity:.35}}

  .board{position:relative;display:flex;flex:1;min-height:0;width:100%;box-sizing:border-box;padding:9px;gap:8px;
    background:#241a11;border-radius:16px;border:1px solid #120c06;
    box-shadow:inset 0 0 0 6px #1d150d, inset 0 2px 8px rgba(0,0,0,.5), 0 18px 40px rgba(0,0,0,.45)}
  .field{display:flex;flex-direction:column;flex:1;min-width:0;position:relative}
  .half{display:flex;flex:1;min-height:0}
  .quad{display:flex;flex:1}
  .bar{width:20px;flex:0 0 20px;
    background:linear-gradient(90deg,#0c0805 0%,#3a2b1a 20%,#6b512f 50%,#3a2b1a 80%,#0c0805 100%);
    box-shadow:1px 0 4px rgba(0,0,0,.6),-1px 0 4px rgba(0,0,0,.6),inset 0 0 0 .5px rgba(150,116,72,.25)}
  .bar.top{border-radius:3px 3px 0 0}.bar.bot{border-radius:0 0 3px 3px}
  .midband{height:10px;flex:0 0 10px;background:transparent}
  .pt{position:relative;flex:1;height:100%;cursor:pointer;touch-action:none}
  .dragchk{position:fixed;width:30px;height:30px;border-radius:50%;transform:translate(-50%,-50%);
    z-index:200;pointer-events:none;box-shadow:0 8px 18px rgba(0,0,0,.6),0 0 0 2.5px #46ac79}
  .dragchk.w{background:radial-gradient(circle at 38% 30%,#f5edda,#d7c8a6 82%);border:1px solid #bfaf86}
  .dragchk.b{background:radial-gradient(circle at 38% 30%,#45474e,#1b1c20 84%);border:1px solid #0e0f13}
  .chk.dragging{opacity:.35}
  .tri{position:absolute;left:11%;right:11%;height:68%}
  .tri.top{top:0;clip-path:polygon(0 0,100% 0,50% 100%)}
  .tri.bot{bottom:0;clip-path:polygon(50% 0,0 100%,100% 100%)}
  .chk{position:absolute;left:50%;width:80%;max-width:24px;aspect-ratio:1;border-radius:50%;transform:translateX(-50%);
    display:flex;align-items:center;justify-content:center}
  .chk.w{background:radial-gradient(circle at 38% 30%,#f5edda,#d7c8a6 82%);border:1px solid #bfaf86;box-shadow:0 1px 2px rgba(0,0,0,.5)}
  .chk.b{background:radial-gradient(circle at 38% 30%,#45474e,#1b1c20 84%);border:1px solid #0e0f13;box-shadow:0 1px 2px rgba(0,0,0,.5)}
  .chk .lab{font-weight:800;font-size:12px;letter-spacing:-.02em;line-height:1}
  .chk.w .lab{color:#2a251d}.chk.b .lab{color:#ece8df}
  .chk.glow{box-shadow:0 0 0 2px rgba(70,172,121,.9),0 0 12px rgba(70,172,121,.5)}
  .marker{position:absolute;left:50%;transform:translateX(-50%);width:80%;max-width:24px;aspect-ratio:1;border-radius:50%;
    border:2.5px solid var(--accent);background:rgba(70,172,121,.24);
    box-shadow:0 0 12px rgba(70,172,121,.75),inset 0 0 7px rgba(70,172,121,.45);
    animation:ndpulse 1.6s ease-in-out infinite;z-index:45;pointer-events:none}
  .pt.src::after{content:"";position:absolute;left:50%;transform:translateX(-50%);width:76%;max-width:24px;aspect-ratio:1;
    border-radius:50%;border:1.5px dashed rgba(70,172,121,.55);pointer-events:none}
  .pt.src.top::after{top:4px}.pt.src.bot::after{bottom:4px}
  .pt.flash::after{content:"";position:absolute;left:50%;transform:translateX(-50%);width:80%;max-width:25px;aspect-ratio:1;
    border-radius:50%;border:2.5px solid var(--accent);box-shadow:0 0 12px rgba(70,172,121,.6);pointer-events:none;z-index:26}
  .pt.flash.top::after{top:3px}.pt.flash.bot::after{bottom:3px}
  .traycol{width:34px;flex:0 0 34px;display:flex;flex-direction:column;gap:8px}
  .traycell{flex:1;border-radius:11px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.28);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-shadow:inset 0 1px 3px rgba(0,0,0,.5);cursor:pointer}
  .traycell.canoff{border-color:var(--accent);box-shadow:0 0 12px rgba(70,172,121,.4),inset 0 1px 3px rgba(0,0,0,.5)}
  .disc{width:15px;height:15px;border-radius:50%;box-shadow:0 1px 2px rgba(0,0,0,.5)}
  .disc.w{background:radial-gradient(circle at 38% 30%,#f5edda,#d7c8a6 82%);border:1px solid #bfaf86}
  .disc.b{background:radial-gradient(circle at 38% 30%,#45474e,#1b1c20 84%);border:1px solid #0e0f13}
  .traylab{font-weight:700;font-size:12px;color:#9a8f7d;font-variant-numeric:tabular-nums}
  .thinkoverlay{position:absolute;inset:0;border-radius:16px;background:rgba(14,12,9,.5);backdrop-filter:blur(2px);
    -webkit-backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:50}
  .thinkoverlay.hidden{display:none}
  .chip{display:flex;align-items:center;gap:11px;padding:11px 18px;border-radius:999px;background:rgba(28,30,36,.92);
    border:1px solid rgba(70,172,121,.4);box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .spinner{width:17px;height:17px;border-radius:50%;border:2.5px solid rgba(70,172,121,.25);border-top-color:var(--accent);
    animation:ndspin .8s linear infinite;flex:none}
  .chiptext{font-weight:700;font-size:14px;color:#e9e6df}
  /* Roll button — straddles the bottom edge of the board */
  .rolllayer{position:absolute;left:50%;bottom:-24px;transform:translateX(-50%);z-index:60;display:none}
  .rollbtn{display:inline-flex;align-items:center;gap:12px;height:56px;padding:0 24px 0 20px;border:none;
    border-radius:18px;background:#46ac79;color:#0e1411;font-family:inherit;font-weight:800;font-size:17px;
    letter-spacing:.01em;cursor:pointer;box-shadow:0 14px 32px rgba(70,172,121,.5),0 0 0 5px rgba(21,22,26,.92)}
  .rollbtn:active{transform:scale(.97)}
  .rddice{display:flex;gap:6px}
  .rd{width:22px;height:22px;border-radius:6px;background:#f6efdf;position:relative;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.7)}
  .rd1::before{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:4.5px;height:4.5px;border-radius:50%;background:#28261f}
  .rd2::before{content:"";position:absolute;left:5px;top:5px;width:4px;height:4px;border-radius:50%;background:#28261f}
  .rd2::after{content:"";position:absolute;right:5px;bottom:5px;width:4px;height:4px;border-radius:50%;background:#28261f}
  /* Dice — centered on the playing field */
  .dicelayer{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:40;display:none}
  .dicebox{display:flex;gap:10px;padding:7px;border-radius:13px;background:rgba(20,14,8,.35);
    -webkit-backdrop-filter:blur(1px);backdrop-filter:blur(1px)}
  /* Undo — lives in the off-tray column, between the two trays */
  .undobtn{flex:0 0 44px;border-radius:12px;background:#23252b;border:1px solid rgba(255,255,255,.1);
    color:#cfd0d6;font-size:19px;font-weight:700;display:flex;align-items:center;justify-content:center;
    cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.4)}
  .undobtn:active{transform:scale(.95)}
  .bottomlinks{display:flex;align-items:center;justify-content:center;gap:14px;padding:12px 0 4px;
    font-size:13px;font-weight:700;color:var(--muted)}
  .bottomlinks span{cursor:pointer}
  .bottomlinks .dsep{cursor:default;opacity:.5}
  @keyframes ndpulse{0%,100%{opacity:.5;transform:translateX(-50%) scale(.9)}50%{opacity:1;transform:translateX(-50%) scale(1.08)}}
  @keyframes ndspin{to{transform:rotate(360deg)}}

  .controls{margin-top:auto;padding:12px 0 4px}
  .dicerow{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;min-height:46px}
  .die{width:34px;height:34px;border-radius:9px;background:linear-gradient(155deg,#f6efdf,#e2d6bb);border:1px solid #cabf9d;
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);padding:5px;box-sizing:border-box;
    box-shadow:0 4px 10px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.65)}
  .die.ghost{background:var(--surface);border:1px dashed var(--line);opacity:.55;box-shadow:none}
  .die.used{background:linear-gradient(155deg,#8f887a,#6f6a5e);border-color:#5c584e;opacity:.5}
  .die.rolling{animation:ndroll .16s ease-in-out infinite}
  @keyframes ndroll{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-4px) rotate(6deg)}}
  .pip{width:5.5px;height:5.5px;border-radius:50%;background:#28261f;align-self:center;justify-self:center;
    box-shadow:inset 0 1px 1px rgba(0,0,0,.35)}
  .movesleft{text-align:center;margin-bottom:10px}
  .movesleft .ov{font-size:10.5px;font-weight:700;letter-spacing:.09em;color:var(--muted);text-transform:uppercase}
  .movesleft .n{font-weight:800;font-size:17px}
  .enginebar{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 0}
  .btn{border:none;font-family:inherit;font-weight:800;cursor:pointer;transition:transform .12s}
  .btn:active{transform:scale(.985)}
  .btn.primary{width:100%;height:58px;border-radius:17px;background:linear-gradient(180deg,#54bd87,#3f9d6e);
    color:var(--on-accent);font-size:18px;box-shadow:0 12px 26px rgba(70,172,121,.32)}
  .actionrow{display:flex;gap:10px}
  .btn.undo{width:110px;height:52px;border-radius:15px;background:var(--surface);color:var(--text);border:1px solid var(--line);font-size:15px}
  .btn.helper{flex:1;height:52px;border-radius:15px;background:#46ac79;color:#0e1411;border:none;
    font-size:16px;font-weight:800;box-shadow:0 10px 22px rgba(70,172,121,.3)}
  .btn.helper:disabled{opacity:1;cursor:default}
  .movesleft-inline{margin-left:6px;display:flex;flex-direction:column;gap:2px}
  .movesleft-inline .ovl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .movesleft-inline .nl{font-size:17px;font-weight:800}

  /* ===== opening roll overlay ===== */
  .openmodal{max-width:340px;text-align:center}
  .openttl{font-size:20px;font-weight:800;margin-bottom:4px}
  .opensub{font-size:12.5px;color:var(--muted);font-weight:600;margin-bottom:22px}
  .openrow{display:flex;align-items:stretch;justify-content:center;gap:14px;margin-bottom:20px}
  .openside{display:flex;flex-direction:column;align-items:center;gap:12px;flex:1;padding:14px 6px;border-radius:14px;
    border:1px solid var(--line);background:rgba(255,255,255,.02);transition:border-color .2s,background .2s}
  .openside.win{border-color:var(--accent);background:rgba(70,172,121,.1)}
  .opennm{font-size:13px;font-weight:700;color:var(--text2)}
  .opendice{display:flex;min-height:34px;align-items:center;justify-content:center}
  .openvs{align-self:center;font-size:12px;font-weight:800;color:var(--muted)}
  .openresult{font-size:16px;font-weight:800;color:var(--accent-text);min-height:22px}

  .overlay{position:fixed;inset:0;background:rgba(8,9,12,.72);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
    display:none;align-items:center;justify-content:center;padding:24px;z-index:100}
  .overlay.show{display:flex}
  .modal{background:linear-gradient(160deg,#1b2118,#14140f);border:1px solid rgba(70,172,121,.28);border-radius:26px;
    padding:26px 22px;max-width:340px;width:100%;text-align:center;box-shadow:0 30px 70px rgba(0,0,0,.6)}
  .emblem{width:74px;height:74px;border-radius:21px;margin:0 auto 14px;position:relative;
    background:linear-gradient(150deg,#54bd87,#2f8a5e);display:flex;align-items:center;justify-content:center;
    box-shadow:0 14px 34px rgba(70,172,121,.4)}
  .ediamond{width:26px;height:26px;background:#ece2cd;transform:rotate(45deg);border-radius:6px}
  .pbadge{position:absolute;top:-8px;right:-8px;background:var(--bg);border:1px solid var(--accent);
    color:var(--accent-text);font-size:13px;font-weight:800;padding:2px 9px;border-radius:999px}
  .rhead{font-size:32px;font-weight:800;letter-spacing:-.02em;color:var(--accent-text);margin:0 0 6px}
  .rsub{font-size:14px;font-weight:600;color:var(--muted);margin:0 0 18px;line-height:1.5}
  .rsub b{color:#e08079}
  .rscore{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:18px}
  .rava{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}
  .rava.w{background:radial-gradient(circle at 38% 30%,#f5edda,#d7c8a6 82%);color:#2a251d;box-shadow:0 0 0 2px var(--accent),0 0 14px rgba(70,172,121,.5)}
  .rava.b{background:radial-gradient(circle at 38% 30%,#45474e,#1b1c20 84%);color:#ece8df}
  .rscoreval{font-size:28px;font-weight:800}
  .rlabel{font-size:10px;font-weight:700;letter-spacing:.09em;color:var(--muted);margin-top:2px}
  .rbtns{display:flex;flex-direction:column;gap:10px}
  .rrow{display:flex;gap:10px}
  .rbtns .btn.primary{height:54px}
  .btn.ghost{flex:1;height:52px;border-radius:15px;background:var(--surface2);color:var(--text);border:1px solid var(--line);
    font-size:15px;text-decoration:none;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <a class="icbtn" href="home.html" aria-label="Back">‹</a>
    <div class="tbtitle"><div class="ov" id="matchlbl">Match to 5 · vs Engine</div><div class="sc tnum" id="score">0 — 0</div></div>
    <button class="icbtn" id="restartBtn" aria-label="New game">⟳</button>
  </div>

  <div class="strip" id="oppbar">
    <div class="av b" id="oppAv">AI</div>
    <div class="stripmid">
      <div class="striptop"><span class="nm">Narde Engine</span></div>
      <div class="stripbot"><span class="rating" id="oppSub">Engine v15</span><span class="thinklab" id="oppThink" style="display:none">thinking…</span></div>
    </div>
    <div class="clock">—</div>
  </div>

  <div class="turnpill" id="turnpill"><span class="tdot"></span><span class="tlabel" id="tlabel">Your turn</span></div>

  <div class="board" id="board">
    <div class="field">
      <div class="half">
        <div class="quad" id="topLeft"></div>
        <div class="bar top"></div>
        <div class="quad" id="topRight"></div>
      </div>
      <div class="midband"></div>
      <div class="half">
        <div class="quad" id="botLeft"></div>
        <div class="bar bot"></div>
        <div class="quad" id="botRight"></div>
      </div>
      <div class="dicelayer" id="dicelayer"><div class="dicebox" id="dicebox"></div></div>
    </div>
    <div class="traycol">
      <div class="traycell" id="trayB"><div class="disc b"></div><span class="traylab" id="blackOff">0/15</span></div>
      <button class="undobtn" id="undoBtn" aria-label="Undo">↺</button>
      <div class="traycell" id="trayW"><div class="disc w"></div><span class="traylab" id="whiteOff">0/15</span></div>
    </div>
  </div>

  <div class="strip" id="youbar">
    <div class="av w">R</div>
    <div class="stripmid">
      <div class="striptop"><span class="nm">You</span><span class="flagchip">AM</span></div>
      <div class="stripbot"><span class="rating">1610</span></div>
    </div>
    <div class="clock">—</div>
  </div>

  <div class="bottomlinks">
    <span id="resignBtn">Resign</span><span class="dsep">·</span><span id="flagBtn" title="Tell us the engine just played a bad move">⚑ Bad bot move</span>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="emblem"><div class="ediamond"></div><span class="pbadge" id="ptsBadge">+2</span></div>
    <h2 class="rhead" id="winTitle">Mars!</h2>
    <p class="rsub" id="winText"></p>
    <div class="rscore">
      <div class="rava w" id="rAvaW">R</div>
      <div><div class="rscoreval tnum" id="rScore">1 — 0</div><div class="rlabel" id="rLabel">GAME WON</div></div>
      <div class="rava b" id="rAvaB">AI</div>
    </div>
    <div class="rbtns">
      <button class="btn primary" id="againBtn">Rematch</button>
      <div class="rrow">
        <a class="btn ghost" href="review.html">Review</a>
        <a class="btn ghost" href="home.html">Home</a>
      </div>
    </div>
  </div>
</div>

<!-- ===================== OPENING ROLL ===================== -->
<div class="overlay" id="openOverlay">
  <div class="modal openmodal">
    <div class="openttl">Opening roll</div>
    <div class="opensub">Higher die goes first</div>
    <div class="openrow">
      <div class="openside" id="openSideYou"><div class="opennm">You</div><div class="opendice" id="openDieYou"></div></div>
      <div class="openvs">vs</div>
      <div class="openside" id="openSideEng"><div class="opennm">Engine</div><div class="opendice" id="openDieEng"></div></div>
    </div>
    <div class="openresult" id="openResult">…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

    if(target>=1){ var dest=physIndex(pl,target); if(owner(bd,dest)!==opp) subs.push({fromRel:r,die:die,kind:'move',toRel:target}); }
    else if(bear){ if(r===die) subs.push({fromRel:r,die:die,kind:'off',toRel:0}); else if(r<die && r===hi) subs.push({fromRel:r,die:die,kind:'off',toRel:0}); } }
  return subs; }

  for(var start=1;start<=19;start++){ var ok=true; for(var k=0;k<6;k++){ if(!owned[start+k]){ok=false;break;} } if(!ok) continue;
    var end=start+5; if(bd.off[opp]>0) continue; var all=true; for(var j=0;j<pos.length;j++){ if(pos[j]<=end){all=false;break;} } if(all) return true; }

    for(var j=0;j<subs.length;j++){ var s=subs[j],isHead=(s.fromRel===HEAD); if(isHead&&headUsed+1>headLimit) continue; extended=true;

/* ===== Strong heuristic engine (v16): board-aware eval + 2-ply expectimax =====

   opponent's checkers. Eval rewards: checkers borne off, pip lead, home-board
   readiness, and blocking/priming the opponent (huge when a full 6-prime traps). */
function homeReady(bd,pl){ var c=0; for(var p=0;p<24;p++){ if(owner(bd,p)===pl && toRel(pl,p)<=6) c+=Math.abs(bd.pts[p]); } return c; }

  for(var p=0;p<24;p++){ var o=owner(bd,p); if(o===pl) myB[toRel(opp,p)]=1; else if(o===opp) oppAt[toRel(opp,p)]=Math.abs(bd.pts[p]); }

/* Reachable destinations for the selected checker — including combined-dice
   landings (e.g. rolled 6-3: show the 3, the 6, AND the 9 spot). Each entry
   carries the chain of submoves to apply when tapped. */
function computeDests(){
  var map={}, k=G.prefix.length, cs=consistentSeqs();
  cs.forEach(function(sq){
    var m0=sq.moves[k];
    if(!m0 || m0.fromRel!==G.selected) return;
    var cur=G.selected, idx=k, chain=[];
    while(idx<sq.moves.length){
      var mv=sq.moves[idx];
      if(mv.fromRel!==cur) break;   // chain broken — a different checker moves next
      chain.push(mv);
      if(mv.kind==='off'){ if(!map['off']) map['off']={kind:'off',chain:chain.slice()}; break; }
      var key='r'+mv.toRel;
      if(!map[key]) map[key]={kind:'move',toRel:mv.toRel,chain:chain.slice()};
      cur=mv.toRel; idx++;
    }
  });
  return map;
}
function renderHighlights(){
  document.getElementById('trayW').classList.remove('canoff');
  G._destMap={};
  if(G.turn!==WHITE || !G.dice || G.seqs.length===0 || G.selected===null) return;
  var map=computeDests(); G._destMap=map;
  Object.keys(map).forEach(function(key){
    var e=map[key];
    if(e.kind==='off'){ document.getElementById('trayW').classList.add('canoff'); return; }
    var phys=physIndex(WHITE,e.toRel), info=cellEls[phys];
    var n=Math.abs(G.board.pts[phys]), off=n*10.5+(n>0?1:3);

    m.style[info.top?'top':'bottom']=off+'px'; info.el.appendChild(m);
  });
}

}

/* ================= DICE ================= */
var PIPS={1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
function rnd6(){ return 1+Math.floor(Math.random()*6); }
function buildDie(val,used,rolling){ var die=document.createElement('div'); die.className='die'+(used?' used':'')+(rolling?' rolling':'');
  var set=PIPS[val]; for(var i=0;i<9;i++){ var s=document.createElement('span'); if(set.indexOf(i)>=0) s.className='pip'; die.appendChild(s); } return die; }
function ghostDie(){ var die=document.createElement('div'); die.className='die ghost'; for(var i=0;i<9;i++){ var s=document.createElement('span'); if(i===4){ s.className='pip'; s.style.background='#7d7f88'; } die.appendChild(s); } return die; }
function renderDiceValues(vals,used,rolling){ var el=document.getElementById('dicebox'); if(!el) return; el.innerHTML=''; for(var d=0;d<vals.length;d++) el.appendChild(buildDie(vals[d],d<used,rolling)); }
function renderDice(){ var el=document.getElementById('dicebox'); if(!el) return; el.innerHTML='';
  if(!G.dice) return;
  var vals=G.dice[0]===G.dice[1]?[G.dice[0],G.dice[0],G.dice[0],G.dice[0]]:[G.dice[0],G.dice[1]];
  var rem={};   // count of each die value already played this turn
  if(G.turn===WHITE){ G.prefix.forEach(function(s){ rem[s.die]=(rem[s.die]||0)+1; }); }
  for(var d=0;d<vals.length;d++){ var v=vals[d], u=false; if(rem[v]>0){ u=true; rem[v]--; } el.appendChild(buildDie(v,u,false)); } }
function animateRoll(done){ G.animating=true;
  var dl=document.getElementById('dicelayer'); if(dl) dl.style.display='block';
  var ub=document.getElementById('undoBtn'); if(ub) ub.style.display='none';
  var i=0,ticks=10; var iv=setInterval(function(){ renderDiceValues([rnd6(),rnd6()],0,true);
  if(++i>=ticks){ clearInterval(iv); G.animating=false; renderDice(); done(); } }, 60); }

/* ================= CONTROLS ================= */
function updateBoardControls(){
  var dl=document.getElementById('dicelayer'); if(dl) dl.style.display = (G.dice && !gameOver)?'block':'none';
  var ub=document.getElementById('undoBtn'); if(ub) ub.style.display = (G.turn===WHITE && G.dice && !gameOver)?'flex':'none';
  renderDice();
}
function maybeAutoRoll(){ if(G.turn===WHITE && !G.dice && !gameOver && !G.animating) onRoll(); }

/* ================= INTERACTION ================= */
function sameSub(a,b){ return a&&b&&a.fromRel===b.fromRel&&a.die===b.die&&a.kind===b.kind&&a.toRel===b.toRel; }
function consistentSeqs(){ return G.seqs.filter(function(sq){ for(var i=0;i<G.prefix.length;i++){ if(!sameSub(G.prefix[i],sq.moves[i])) return false; } return true; }); }
function nextSubs(){ var k=G.prefix.length,cs=consistentSeqs(),out=[],seen={}; cs.forEach(function(sq){ var s=sq.moves[k]; if(!s) return; var key=s.fromRel+'-'+s.die+'-'+s.kind+'-'+s.toRel; if(!seen[key]){ seen[key]=1; out.push(s); } }); return out; }
function handleTap(phys){
  if(G.turn!==WHITE || !G.dice || G.seqs.length===0 || G.animating) return;
  var ns=nextSubs(); var rel = owner(G.board,phys)===WHITE ? toRel(WHITE,phys) : null;
  if(G.selected===null){ if(rel!==null && ns.some(function(s){return s.fromRel===rel;})){ G.selected=rel; render(); } return; }
  if(rel===G.selected){ G.selected=null; render(); return; }
  var destRel=toRel(WHITE,phys);
  var e=G._destMap && G._destMap['r'+destRel];
  if(e){ doChain(e.chain); return; }
  if(rel!==null && ns.some(function(s){return s.fromRel===rel;})){ G.selected=rel; render(); return; }
}
function onTrayTap(){
  if(G.turn!==WHITE || G.selected===null || G.animating) return;
  var e=G._destMap && G._destMap['off'];
  if(e) doChain(e.chain);
}
function doChain(chain){
  for(var i=0;i<chain.length;i++){ G.board=applySub(G.board,WHITE,chain[i]); G.prefix.push(chain[i]); }
  G.selected=null; render();
  if(allOff(G.board,WHITE)){ logTurn(WHITE,G.dice,G.prefix); return endGame(WHITE); }
  if(G.prefix.length>=G.maxLen){ logTurn(WHITE,G.dice,G.prefix); finishHumanTurn(); }
}

/* ================= DRAG & DROP ================= */
var drag=null;
function isSource(phys){ if(owner(G.board,phys)!==WHITE) return false; var rel=toRel(WHITE,phys);
  return nextSubs().some(function(s){ return s.fromRel===rel; }); }
function onPointerDown(phys,ev){
  if(G.turn!==WHITE || !G.dice || G.animating || gameOver) return;
  drag={phys:phys, x0:ev.clientX, y0:ev.clientY, active:false, ghost:null};
}
function onPointerMove(ev){
  if(!drag) return;
  if(!drag.active){
    if(Math.abs(ev.clientX-drag.x0)+Math.abs(ev.clientY-drag.y0) < 6) return;
    if(!isSource(drag.phys)){ drag=null; return; }
    var rel=toRel(WHITE,drag.phys);
    if(G.selected!==rel){ G.selected=rel; render(); }
    drag.active=true;
    var g=document.createElement('div'); g.className='dragchk w'; document.body.appendChild(g); drag.ghost=g;
  }
  drag.ghost.style.left=ev.clientX+'px'; drag.ghost.style.top=ev.clientY+'px';
  ev.preventDefault();
}
function onPointerUp(ev){
  if(!drag) return;
  if(drag.active){
    if(drag.ghost) drag.ghost.remove();
    var el=document.elementFromPoint(ev.clientX, ev.clientY);
    var pt=el&&el.closest?el.closest('.pt'):null;
    var tray=el&&el.closest?el.closest('#trayW'):null;
    var applied=false;
    if(pt&&pt.dataset.phys!=null){ var e=G._destMap && G._destMap['r'+toRel(WHITE,+pt.dataset.phys)]; if(e){ drag=null; doChain(e.chain); applied=true; } }
    else if(tray){ var eo=G._destMap && G._destMap['off']; if(eo){ drag=null; doChain(eo.chain); applied=true; } }
    if(!applied){ drag=null; render(); }
    return;
  }
  var p=drag.phys; drag=null; handleTap(p);   // treated as a tap
}
document.addEventListener('pointermove', onPointerMove, {passive:false});
document.addEventListener('pointerup', onPointerUp);
document.addEventListener('pointercancel', function(){ if(drag&&drag.ghost) drag.ghost.remove(); drag=null; });

/* ================= FLOW ================= */
var G;
function roll(){ return [rnd6(),rnd6()]; }
function newGame(){ G={board:initialBoard(),turn:WHITE,dice:null,hasMoved:{},seqs:[],prefix:[],selected:null,turnStart:null,maxLen:0,animating:false,log:[],flags:[]};
  G.hasMoved[WHITE]=false; G.hasMoved[BLACK]=false; gameOver=false; document.getElementById('overlay').classList.remove('show'); showThinking(false); render(); setTimeout(doOpeningRoll,450); }
/* Opening roll: you + engine each roll one die, higher starts (ties re-roll), then the winner rolls fresh. */
function doOpeningRoll(){
  var w,b; do{ w=rnd6(); b=rnd6(); }while(w===b);
  var starter=w>b?WHITE:BLACK;
  showOpening(w,b,starter,function(){ G.turn=starter; if(starter===WHITE) maybeAutoRoll(); else startBotTurn(); });
}
function showOpening(youDie,engDie,starter,done){
  var ov=document.getElementById('openOverlay');
  var dy=document.getElementById('openDieYou'), de=document.getElementById('openDieEng');
  var sy=document.getElementById('openSideYou'), se=document.getElementById('openSideEng');
  document.getElementById('openResult').textContent='…';
  sy.classList.remove('win'); se.classList.remove('win');
  ov.classList.add('show');
  var i=0,ticks=9;
  var iv=setInterval(function(){
    dy.innerHTML=''; dy.appendChild(buildDie(rnd6(),false,true));
    de.innerHTML=''; de.appendChild(buildDie(rnd6(),false,true));
    if(++i>=ticks){ clearInterval(iv);
      dy.innerHTML=''; dy.appendChild(buildDie(youDie,false,false));
      de.innerHTML=''; de.appendChild(buildDie(engDie,false,false));
      sy.classList.toggle('win',starter===WHITE);
      se.classList.toggle('win',starter===BLACK);
      document.getElementById('openResult').textContent=(starter===WHITE)?'You go first!':'Engine goes first';
      setTimeout(function(){ ov.classList.remove('show'); if(done) done(); }, 1600);
    }
  },70);
}
function onRoll(){
  if(G.turn!==WHITE || G.dice || G.animating) return;
  G.dice=roll(); G.prefix=[]; G.selected=null; G.turnStart=cloneBoard(G.board);
  animateRoll(function(){
    G.seqs=generate(G.board,WHITE,G.dice,headLimitFor(G.hasMoved,WHITE,G.dice));
    G.maxLen=G.seqs.length?G.seqs[0].moves.length:0;
    if(G.seqs.length===0){ logTurn(WHITE,G.dice,[]); G.hasMoved[WHITE]=true; G.turn=BLACK; G.dice=null; render(); setTimeout(startBotTurn,700); return; }
    render();
  });
}
function onUndo(){ if(!G.turnStart) return; G.board=cloneBoard(G.turnStart); G.prefix=[]; G.selected=null; render(); }
function finishHumanTurn(){ G.hasMoved[WHITE]=true; if(allOff(G.board,WHITE)) return endGame(WHITE); G.turn=BLACK; G.dice=null; G.seqs=[]; G.prefix=[]; render(); setTimeout(startBotTurn,450); }
function startBotTurn(){
  var dice=roll(); G.dice=dice; showThinking(true);
  animateRoll(function(){
    var hl=headLimitFor(G.hasMoved,BLACK,dice); G.hasMoved[BLACK]=true;
    setTimeout(function(){
      var chosen=chooseBotMove(G.board,BLACK,dice,hl);
      showThinking(false);
      if(!chosen){ logTurn(BLACK,dice,[]); afterBot(); return; }
      logTurn(BLACK,dice,chosen.moves);
      playBotSequence(chosen.moves, afterBot);
    }, 60);
  });
}
function playBotSequence(moves,done){ G.animating=true; var i=0;
  function step(){ if(i>=moves.length){ G.animating=false; done(); return; } var s=moves[i]; G.board=applySub(G.board,BLACK,s); render(); flashMove(BLACK,s);
    if(allOff(G.board,BLACK)){ G.animating=false; return endGame(BLACK); } i++; setTimeout(step,600); }
  setTimeout(step,300); }
function flashMove(pl,s){ if(s.kind==='off') return; var cell=cellEls[physIndex(pl,s.toRel)].el; cell.classList.add('flash'); setTimeout(function(){ cell.classList.remove('flash'); },520); }
function afterBot(){ if(allOff(G.board,BLACK)) return endGame(BLACK); G.turn=WHITE; G.dice=null; G.seqs=[]; G.prefix=[]; render(); setTimeout(maybeAutoRoll,600); }
function showThinking(on){ document.getElementById('oppThink').style.display=on?'inline':'none'; }

/* ================= RESULT ================= */
var gameOver=false, SCORE_YOU=0, SCORE_ENG=0;
var MATCH_TARGET=(function(){ try{ var u=new URLSearchParams(location.search).get('to'); if(u) return Math.max(1,parseInt(u,10)||5);
  var s=localStorage.getItem('narde_match'); return s?parseInt(s,10):5; }catch(e){ return 5; } })();
function endGame(winner, opts){
  if(gameOver) return; gameOver=true;
  G.animating=true; G.dice=null;
  document.getElementById('overlay').classList.add('show');   // show first — can't be blocked
  showThinking(false);
  try{
    var resign=!!(opts&&opts.resign);
    var loser=-winner, mars = resign ? false : (G.board.off[loser]===0), youWon=winner===WHITE, pts=mars?2:1;
    if(youWon) SCORE_YOU+=pts; else SCORE_ENG+=pts;
    var matchOver = SCORE_YOU>=MATCH_TARGET || SCORE_ENG>=MATCH_TARGET, matchWon = SCORE_YOU>=MATCH_TARGET;
    var t=document.getElementById('winTitle');
    t.textContent = matchOver ? (matchWon?"Match won!":"Match lost")
      : youWon ? (mars?"Mars!":"Victory") : (resign?"Resigned":(mars?"Mars — you lost":"Defeat"));
    t.style.color = (matchOver?matchWon:youWon) ? "#7fdca8" : "#e08079";
    document.getElementById('ptsBadge').textContent="+"+pts;
    var txt = resign && !youWon ? "You resigned — the engine takes 1 point."
      : youWon ? (mars?"Double win — the engine bore off <b>0</b> checkers. Worth 2 points.":"You won this game. Worth 1 point.")
      : (mars?"Mars — you bore off <b>0</b> checkers. The engine scores 2 points.":"The engine won this game. Worth 1 point.");
    if(matchOver) txt += matchWon ? " You win the match to "+MATCH_TARGET+"!" : " The engine wins the match to "+MATCH_TARGET+".";
    document.getElementById('winText').innerHTML = txt;
    document.getElementById('rScore').textContent = SCORE_YOU+" — "+SCORE_ENG;
    document.getElementById('rLabel').textContent = matchOver ? (matchWon?"MATCH WON":"MATCH LOST") : (youWon?"GAME WON":"GAME LOST");
    document.getElementById('rAvaW').style.opacity = youWon?"1":".65";
    document.getElementById('rAvaB').style.opacity = youWon?".65":"1";
    var sc=document.getElementById('score'); if(sc) sc.textContent=SCORE_YOU+" — "+SCORE_ENG;
    var ab=document.getElementById('againBtn'); if(ab) ab.textContent = matchOver ? "New match" : "Next game";
    saveResult(youWon, mars);
    saveLog(youWon, mars);
  }catch(e){}
}
function nextGame(){
  if(SCORE_YOU>=MATCH_TARGET || SCORE_ENG>=MATCH_TARGET){ SCORE_YOU=0; SCORE_ENG=0; var sc=document.getElementById('score'); if(sc) sc.textContent="0 — 0"; }
  newGame();
}
function resignGame(){ if(gameOver) return; if(window.confirm("Resign this game? It counts as a loss.")) endGame(BLACK,{resign:true}); }

/* ================= WIRE UP ================= */
buildBoard();
document.getElementById('trayW').addEventListener('click', onTrayTap);
document.getElementById('restartBtn').addEventListener('click', newGame);
document.getElementById('againBtn').addEventListener('click', nextGame);
document.getElementById('undoBtn').addEventListener('click', onUndo);
document.getElementById('resignBtn').addEventListener('click', resignGame);
document.getElementById('flagBtn').addEventListener('click', function(){
  if(!G || !G.log) return;
  var idx=-1; for(var i=G.log.length-1;i>=0;i--){ if(G.log[i].p==='engine'){ idx=i; break; } }
  if(idx<0) return;
  if(G.flags.indexOf(idx)<0) G.flags.push(idx);
  var b=this; var old=b.textContent; b.textContent='✓ Flagged — thanks'; b.style.color='#7fdca8';
  setTimeout(function(){ b.textContent=old; b.style.color=''; }, 1600);
});
newGame();
(function(){ var e=document.getElementById('oppSub'); if(e) e.textContent="Engine v"+ENGINE_VERSION+" · "+levelName(BOT_LEVEL);
  var m=document.getElementById('matchlbl'); if(m) m.textContent="Match to "+MATCH_TARGET+" · "+levelName(BOT_LEVEL); })();
/* v16 uses the built-in board-aware evaluator + 2-ply search; no external weights fetch. */
</script>
</body>
